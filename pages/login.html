<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Entrar — Omnibites</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <a href="../index.html" class="logo">OMNI<span>BITES</span></a>
    <div class="nav-links">
      <a href="comunidad.html">Soundbites</a>
      <a href="explorar.html">Explorar música</a>
      <a href="subir.html">Crear Soundbite</a>
      <div id="nav-auth"></div>
    </div>
    <button class="hamburger" id="hamburger" aria-label="Menú">&#9776;</button>
  </nav>
  <div class="mobile-menu" id="mobileMenu">
    <a href="comunidad.html">Soundbites</a>
    <a href="explorar.html">Explorar música</a>
    <a href="subir.html">Crear Soundbite</a>
    <div id="mobile-auth"></div>
  </div>

  <main class="form-page">
    <div class="form-card">
      <h1>Entrar</h1>
      <p>Bienvenido de nuevo a Omnibites</p>

      <button class="btn-google" id="googleBtn">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
        Continuar con Google
      </button>

      <div class="divider"><span>o con correo</span></div>
      <div id="errMsg" class="form-error"></div>

      <div class="form-group"><label>Correo</label><input type="email" id="email" placeholder="tu@correo.com"/></div>
      <div class="form-group"><label>Contraseña</label><input type="password" id="password" placeholder="••••••••"/></div>

      <button class="btn-primary form-submit" id="loginBtn">Entrar</button>
      <p class="form-alt">¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
    </div>
  </main>

  <script type="module">
    import { auth } from '../js/firebase-config.js';
    import { signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const ROOT = location.hostname === 'jhondydario.github.io' ? '/Omnibites' : '';
    const showErr = msg => { const e=document.getElementById('errMsg'); e.textContent=msg; e.style.display='block'; };

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('password').value;
      if (!email || !pass) return showErr('Completa todos los campos.');
      try {
        await signInWithEmailAndPassword(auth, email, pass);
        window.location.href = ROOT + '/index.html';
      } catch { showErr('Correo o contraseña incorrectos.'); }
    });

    document.getElementById('googleBtn').addEventListener('click', async () => {
      try {
        await signInWithPopup(auth, new GoogleAuthProvider());
        window.location.href = ROOT + '/index.html';
      } catch (e) { showErr('Error con Google: ' + e.message); }
    });
  </script>
  <script type="module" src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
</body>
</html>
