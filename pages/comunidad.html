<body>

</a>

    <a href="comunidad.html">Comunidad</a>

  <div class="com-header">
    <h1>Soundbites de la Comunidad</h1>
    <div class="com-search">
      <input type="text" id="searchInput" placeholder="Buscar por título, juego o usuario..."/>
      <button class="btn-primary" id="searchBtn">Buscar</button>
    </div>
  </div>

  <div class="filters">
    <div class="filter-group">
      <label>Consola:</label>
      <select id="consolaFilter">
        <option value="">Todas</option>
        <optgroup label="Nintendo">
          <option value="NES">NES / Famicom</option>
          <option value="SNES">Super Nintendo</option>
          <option value="N64">Nintendo 64</option>
          <option value="GBA">Game Boy / GBA / DS</option>
          <option value="GameCube">GameCube</option>
          <option value="Wii">Wii</option>
          <option value="WiiU">Wii U</option>
          <option value="3DS">Nintendo 3DS</option>
          <option value="Switch">Nintendo Switch</option>
        </optgroup>
        <optgroup label="PlayStation">
          <option value="PS1">PlayStation 1</option>
          <option value="PS2">PlayStation 2</option>
          <option value="PS3">PlayStation 3</option>
          <option value="PS4">PlayStation 4</option>
          <option value="PSP">PSP / PS Vita</option>
        </optgroup>
        <optgroup label="Sega">
          <option value="MasterSystem">Sega Master System</option>
          <option value="Genesis">Sega Genesis</option>
          <option value="Saturn">Sega Saturn</option>
          <option value="Dreamcast">Dreamcast</option>
        </optgroup>
        <optgroup label="Xbox">
          <option value="Xbox">Xbox Original</option>
          <option value="Xbox360">Xbox 360</option>
        </optgroup>
        <optgroup label="Otros">
          <option value="Arcade">Arcade</option>
          <option value="PC">PC / DOS</option>
          <option value="Otra">Otra</option>
        </optgroup>
      </select>
    </div>
    <div class="filter-group">
      <label>Categoría:</label>
      <select id="catFilter">
        <option value="">Todas</option>
        <option value="orquestal">Orquestal e Instrumental</option>
        <option value="chiptune">Chiptune (8-Bit / 16-Bit)</option>
        <option value="electronica">Electrónica (EDM, Synthwave, Lo-Fi)</option>
        <option value="rock-metal">Rock, Metal e Industrial</option>
        <option value="jazz">Jazz y Dark Jazz / Noir</option>
        <option value="hibrido">Soundtracks Híbridos</option>
        <option value="licenciada">Música Licenciada</option>
      </select>
    </div>
    <div class="filter-group" style="margin-left:auto">
      <label>Ordenar:</label>
      <select id="sortFilter">
        <option value="reciente">Más reciente</option>
        <option value="love">Más amados</option>
      </select>
    </div>
  </div>

  <div class="com-grid">
    <div class="com-cards" id="sbGrid">
      <div style="grid-column:1/-1" class="empty-state"><div class="spinner"></div><p>Cargando soundbites...</p></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>
<script type="module">
    import { auth, db } from '../js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      collection, getDocs, query, orderBy, doc,
      updateDoc, deleteDoc, getDoc, setDoc, arrayUnion, arrayRemove
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const ROOT = location.hostname === 'jhondydario.github.io' ? '/Omnibites' : '';
    let currentUser = null;
    let allItems = [];
    let activeConsola = '', activeCat = '', activeSort = 'reciente';

    onAuthStateChanged(auth, u => { currentUser = u; });

    async function loadSoundbites() {
      try {
        const snap = await getDocs(collection(db,'audios'));
        allItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        render();
      } catch(e) {
        document.getElementById('sbGrid').innerHTML =
          '<div class="empty-state"><p>Error al cargar. Recarga la página.</p></div>';
      }
    }

    function render() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      let items = allItems.filter(a => {
        const mc = !activeConsola || a.consola === activeConsola;
        const mcat = !activeCat || a.categoria === activeCat;
        const ms = !search
          || (a.titulo||'').toLowerCase().includes(search)
          || (a.juego||'').toLowerCase().includes(search)
          || (a.autorNombre||'').toLowerCase().includes(search);
        return mc && mcat && ms;
      });
      if (activeSort === 'love') items.sort((a,b) => (b.reactions?.love||0)-(a.reactions?.love||0));
      if (activeSort === 'reciente') items.sort((a,b) => (b.creadoEn?.seconds||0)-(a.creadoEn?.seconds||0));

      const grid = document.getElementById('sbGrid');
      if (!items.length) {
        grid.innerHTML = '<div class="empty-state"><p>No hay soundbites con esos filtros.</p><a href="subir.html" class="btn-primary" style="margin-top:1rem;display:inline-block">Subir el primero</a></div>';
        return;
      }
      grid.innerHTML = items.map(a => sbCard(a)).join('');
    }

    function sbCard(a) {
      const r = a.reactions || { love:0, meh:0 };
      return `
        <div class="sb-card" id="card-${a.id}">
          <div class="sb-title">${a.titulo||'Sin título'} <span class="sb-dot">·</span> <span class="sb-tag-inline">${a.consola||'—'} · ${a.categoria||'soundbite'}</span></div>
          <div class="sb-meta">${a.juego||'—'} · <a class="sb-author" href="jugador.html?uid=${a.autorId||''}" style="text-decoration:none;color:var(--purple)">${a.autorNombre||'Anónimo'}</a></div>
          <div class="sb-player">
<button class="sb-play" id="sbplay-${a.id}" onclick="playSB('${a.id}','${a.url}',${a.trimStart||0},${a.trimEnd||15})">
  <img src="../assets/icons/play.png" alt="Play"/>
</button>
<div class="sb-prog-wrap">
              <div class="sb-prog-bar"><div class="sb-prog-fill" id="sbprog-${a.id}"></div></div>
              <div class="sb-time"><span id="sbcur-${a.id}">0:00</span><span>${a.duracion||'0:15'}</span></div>
            </div>
          </div>
          <div class="sb-footer">
            <div class="sb-reactions">
              <button class="icon-btn" onclick="react('${a.id}','love')" id="r-love-${a.id}" title="Me encanta">
                <img src="../assets/reactions/love.png" alt="Me encanta"/>
                <span class="icon-count">${r.love||0}</span>
              </button>
              <button class="icon-btn" onclick="react('${a.id}','meh')" id="r-meh-${a.id}" title="Regular">
                <img src="../assets/reactions/meh.png" alt="Regular"/>
                <span class="icon-count">${r.meh||0}</span>
              </button>
            </div>
            <div class="sb-actions">
              <button class="icon-btn" id="fav-${a.id}" onclick="toggleFav('${a.id}')" title="Favorito">
                <img src="../assets/reactions/fav.png" alt="Favorito"/>
              </button>
              <button class="icon-btn" onclick="dlSB('${a.url}','${(a.titulo||'soundbite').replace(/'/g,'')}')" title="Descargar">
                <img src="../assets/reactions/download.png" alt="Descargar"/>
              </button>
            </div>
          </div>
        </div>`;
    }

    async function loadUserData() {
      if (!currentUser) return;
      try {
        const snap = await getDoc(doc(db,'usuarios',currentUser.uid));
        if (!snap.exists()) return;
        const data = snap.data();
        const favs = data.favoritos || [];
        const reacts = data.reacciones || {};
        Object.entries(reacts).forEach(([id, type]) => {
          const btn = document.getElementById(`r-${type}-${id}`);
          if (btn) btn.classList.add(`active-${type}`);
        });
        favs.forEach(id => {
          const btn = document.getElementById(`fav-${id}`);
          if (btn) btn.classList.add('active-fav');
        });
      } catch {}
    }

    window.react = async function(id, type) {
      if (!currentUser) { showAuthPrompt(); return; }
      try {
        const userRef  = doc(db, 'usuarios', currentUser.uid);
        const userSnap = await getDoc(userRef);
        const reacts   = userSnap.exists() ? (userSnap.data().reacciones || {}) : {};
        const prev     = reacts[id];

        const audioRef  = doc(db, 'audios', id);
        const audioSnap = await getDoc(audioRef);
        const reactions = audioSnap.exists() ? (audioSnap.data().reactions || {}) : {};

        const updates = {};

        if (prev) {
          updates[`reactions.${prev}`] = Math.max(0, (reactions[prev] || 0) - 1);
          const prevBtn = document.getElementById(`r-${prev}-${id}`);
          if (prevBtn) {
            prevBtn.classList.remove(`active-${prev}`);
            const s = prevBtn.querySelector('.icon-count');
            if (s) s.textContent = updates[`reactions.${prev}`];
          }
        }

        if (prev === type) {
          delete reacts[id];
          await updateDoc(userRef,  { reacciones: reacts });
          await updateDoc(audioRef, updates);
        } else {
          updates[`reactions.${type}`] = (reactions[type] || 0) + 1;
          reacts[id] = type;
          await updateDoc(userRef,  { reacciones: reacts });
          await updateDoc(audioRef, updates);
          const newBtn = document.getElementById(`r-${type}-${id}`);
          if (newBtn) {
            newBtn.classList.add(`active-${type}`);
            const s = newBtn.querySelector('.icon-count');
            if (s) s.textContent = updates[`reactions.${type}`];
          }
        }
      } catch(e) {
        window.showToast && window.showToast('Error: ' + e.message, 'error');
      }
    };

    window.toggleFav = async function(id) {
      if (!currentUser) { showAuthPrompt(); return; }
      const btn = document.getElementById(`fav-${id}`);
      const isActive = btn?.classList.contains('active-fav');
      try {
        const ref = doc(db,'usuarios',currentUser.uid);
        if (isActive) {
          await updateDoc(ref, { favoritos: arrayRemove(id) });
          btn.classList.remove('active-fav');
          window.showToast && window.showToast('Eliminado de favoritos');
        } else {
          await updateDoc(ref, { favoritos: arrayUnion(id) });
          btn.classList.add('active-fav');
          window.showToast && window.showToast('Guardado en favoritos');
        }
      } catch(e) { window.showToast && window.showToast('Error: ' + e.message,'error'); }
    };

    window.deleteSB = async function(id) {
      if (!currentUser) return;
      if (!confirm('¿Eliminar este soundbite? Esta acción no se puede deshacer.')) return;
      try {
        await deleteDoc(doc(db,'audios',id));
        document.getElementById(`card-${id}`)?.remove();
        allItems = allItems.filter(a => a.id !== id);
        window.showToast && window.showToast('Soundbite eliminado');
      } catch(e) { window.showToast && window.showToast('Error: ' + e.message,'error'); }
    };

    let audioCtx=null,activeSource=null,activeGain=null,activeSBId=null,progIv=null;
    const CLIP=15,FADE=2;
    function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
    function stopSB(){
      if(activeSource){try{activeGain.gain.cancelScheduledValues(audioCtx.currentTime);activeGain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+.3);activeSource.stop(audioCtx.currentTime+.3);}catch{}activeSource=activeGain=null;}
      clearInterval(progIv);
if(activeSBId){const b=document.getElementById(`sbplay-${activeSBId}`);if(b){b.innerHTML='<img src="../assets/icons/play.png" alt="Play"/>';b.classList.remove('playing');b.disabled=false;}...
               activeSBId=null;
    }

    window.playSB=async function(id,url,ts,te){
      if(activeSBId===id){stopSB();return;}
      stopSB();
      const btn=document.getElementById(`sbplay-${id}`);
      if(!btn)return;
      btn.textContent='...';btn.disabled=true;
      try{
        const ctx=getCtx();if(ctx.state==='suspended')await ctx.resume();
        const res=await fetch(url);if(!res.ok)throw new Error('fetch');
        const buf=await ctx.decodeAudioData(await res.arrayBuffer());
        const start=Math.min(ts||0,buf.duration-1);
        const dur=Math.min((te||15)-(ts||0),CLIP,buf.duration-start);
        const source=ctx.createBufferSource();source.buffer=buf;
        const gain=ctx.createGain();
        gain.gain.setValueAtTime(0,ctx.currentTime);
        gain.gain.linearRampToValueAtTime(1,ctx.currentTime+FADE);
        gain.gain.setValueAtTime(1,ctx.currentTime+dur-FADE);
        gain.gain.linearRampToValueAtTime(0,ctx.currentTime+dur);
        source.connect(gain);gain.connect(ctx.destination);
        source.start(0,start,dur);
        source.onended=()=>{if(activeSBId===id)stopSB();};
        activeSource=source;activeGain=gain;activeSBId=id;
        btn.innerHTML='<img src="../assets/icons/pause.png" alt="Pause"/>';
        btn.classList.add('playing');btn.disabled=false;
        const t0=ctx.currentTime;
        progIv=setInterval(()=>{
          const el=ctx.currentTime-t0;
          const p=document.getElementById(`sbprog-${id}`);
          const c=document.getElementById(`sbcur-${id}`);
          if(p)p.style.width=(Math.min(el,dur)/dur*100)+'%';
          if(c)c.textContent=fmt(el);
          if(el>=dur)clearInterval(progIv);
        },100);
      }catch(e){
        const b=document.getElementById(`sbplay-${id}`);
if(b){b.innerHTML='<img src="../assets/icons/error.png" alt="Error"/>';b.style.background='var(--danger)';b.disabled=false;}
setTimeout(()=>{const b=document.getElementById(`sbplay-${id}`);if(b){b.innerHTML='<img src="../assets/icons/play.png" alt="Play"/>';...
                                                                      setTimeout(()=>{const b=document.getElementById(`sbplay-${id}`);if(b){b.textContent='▶';b.style.background='';b.disabled=false;}},3000);
      }
    };

    window.dlSB=async function(url,titulo){
      const btn = event?.target?.closest('.icon-btn');
      if(btn){ const img=btn.querySelector('img'); if(img) img.style.opacity='.3'; btn.disabled=true; }
      try{
        const response = await fetch(url, {mode:'cors'});
        if(!response.ok) throw new Error('HTTP '+response.status);
        const arrayBuf = await response.arrayBuffer();
        const ctx=getCtx();
        if(ctx.state==='suspended') await ctx.resume();
        const buf = await ctx.decodeAudioData(arrayBuf);
        const dur = Math.min(15, buf.duration);
        const sampleRate = Math.min(buf.sampleRate, 44100);
        const offCtx = new OfflineAudioContext(1, Math.floor(dur*sampleRate), sampleRate);
        const src = offCtx.createBufferSource();
        src.buffer = buf;
        const gain = offCtx.createGain();
        gain.gain.setValueAtTime(0, 0);
        gain.gain.linearRampToValueAtTime(1, Math.min(2, dur*0.15));
        gain.gain.setValueAtTime(1, Math.max(dur-2, dur*0.85));
        gain.gain.linearRampToValueAtTime(0, dur);
        src.connect(gain); gain.connect(offCtx.destination); src.start(0, 0, dur);
        const rendered = await offCtx.startRendering();
        const samples = rendered.getChannelData(0);
        const int16 = new Int16Array(samples.length);
        for(let i=0;i<samples.length;i++)
          int16[i]=Math.max(-32768,Math.min(32767,Math.round(samples[i]*32767)));
        if(typeof lamejs === 'undefined') throw new Error('lamejs not loaded');
        const enc = new lamejs.Mp3Encoder(1, sampleRate, 128);
        const mp3 = []; const bs = 1152;
        for(let i=0;i<int16.length;i+=bs){
          const chunk = int16.subarray(i, Math.min(i+bs, int16.length));
          const d = enc.encodeBuffer(chunk);
          if(d.length>0) mp3.push(new Uint8Array(d));
        }
        const end = enc.flush();
        if(end.length>0) mp3.push(new Uint8Array(end));
        const blob = new Blob(mp3, {type:'audio/mpeg'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${titulo.slice(0,50)} [Omnibites].mp3`.replace(/[<>:"/\\|?*]/g,'');
        a.click();
        setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
        window.showToast&&window.showToast('Descargando MP3');
      }catch(e){
        console.error('dlSB error:',e);
        window.showToast&&window.showToast('Error al descargar.','error');
      } finally {
        if(btn){ const img=btn.querySelector('img'); if(img) img.style.opacity=''; btn.disabled=false; }
      }
    };

    function showAuthPrompt() {
      const existing = document.querySelector('.auth-prompt');
      if (existing) { existing.remove(); }
      const el = document.createElement('div');
      el.className = 'auth-prompt';
      el.innerHTML = `Debes iniciar sesión para votar y guardar favoritos.<a href="${ROOT}/pages/login.html">Entrar</a>`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }

    function fmt(s){if(!s||isNaN(s))return'0:00';return`${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;}

    document.getElementById('searchBtn').addEventListener('click', render);
    document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key==='Enter') render(); });
    document.getElementById('consolaFilter').addEventListener('change', e => { activeConsola=e.target.value; render(); });
    document.getElementById('catFilter').addEventListener('change', e => { activeCat=e.target.value; render(); });
    document.getElementById('sortFilter').addEventListener('change', e => { activeSort=e.target.value; render(); });

    await loadSoundbites();
    await loadUserData();
  </script>
