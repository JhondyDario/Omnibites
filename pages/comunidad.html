  <div class="com-header">
    <h1>Community Soundbites</h1>
<div class="com-search">
  <div style="position:relative;flex:1">
    <input type="text" id="searchInput" placeholder="Search by title, game, or user..."
      style="width:100%;padding-right:3rem"/>
    <button id="searchBtn" style="position:absolute;right:.6rem;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;padding:.25rem;opacity:.55;
      display:flex;align-items:center;justify-content:center;transition:opacity .2s"
      onmouseover="this.style.opacity=1" onmouseout="this.style.opacity='.55'">

</div>
  </div>

  <div class="filters">
    <div class="filter-group">
      <label>Console:</label>
      <select id="consolaFilter">
        <option value="">All</option>
        <optgroup label="Nintendo">
          <option value="NES">NES / Famicom</option>
          <option value="SNES">Super Nintendo</option>
          <option value="N64">Nintendo 64</option>
          <option value="GBA">Game Boy / GBA / DS</option>
          <option value="GameCube">GameCube</option>
          <option value="Wii">Wii</option>
          <option value="WiiU">Wii U</option>
          <option value="3DS">Nintendo 3DS</option>
          <option value="Switch">Nintendo Switch</option>
        </optgroup>
        <optgroup label="PlayStation">
          <option value="PS1">PlayStation 1</option>
          <option value="PS2">PlayStation 2</option>
          <option value="PS3">PlayStation 3</option>
          <option value="PS4">PlayStation 4</option>
          <option value="PSP">PSP / PS Vita</option>
        </optgroup>
        <optgroup label="Sega">
          <option value="MasterSystem">Sega Master System</option>
          <option value="Genesis">Sega Genesis</option>
          <option value="Saturn">Sega Saturn</option>
          <option value="Dreamcast">Dreamcast</option>
        </optgroup>
        <optgroup label="Xbox">
          <option value="Xbox">Xbox Original</option>
          <option value="Xbox360">Xbox 360</option>
        </optgroup>
        <optgroup label="Other">
          <option value="Arcade">Arcade</option>
          <option value="PC">PC / DOS</option>
          <option value="Otra">Other</option>
        </optgroup>
      </select>
    </div>
    <div class="filter-group">
      <label>Category:</label>
      <select id="catFilter">
        <option value="">All</option>
        <option value="orquestal">Orchestral & Instrumental</option>
        <option value="chiptune">Chiptune (8-Bit / 16-Bit)</option>
        <option value="electronica">Electronic (EDM, Synthwave, Lo-Fi)</option>
        <option value="rock-metal">Rock, Metal & Industrial</option>
        <option value="jazz">Jazz & Dark Jazz / Noir</option>
        <option value="hibrido">Hybrid Soundtracks</option>
        <option value="licenciada">Licensed Music</option>
      </select>
    </div>
    <div class="filter-group" style="margin-left:auto">

      <select id="sortFilter">
        <option value="reciente">Most recent</option>

<div class="com-grid">
    <div class="com-cards" id="sbGrid">
      <div style="grid-column:1/-1" class="empty-state"><div class="spinner"></div><p>Loading soundbites...</p></div>
    </div>
    <div id="sbPaginator"></div>
  </div>

<script type="module">
    import { auth, db } from '../js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      collection, getDocs, query, orderBy, limit, doc,
      updateDoc, deleteDoc, getDoc, setDoc, arrayUnion, arrayRemove
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const ROOT = location.hostname === 'jhondydario.github.io' ? '/Omnibites' : '';
    let currentUser = null;

    // ── Estrategia de carga: 50 más recientes por defecto, colección completa
    // solo cuando el usuario busca o filtra (se cachea, se pide una sola vez) ──
    let recentItems  = [];
    let allItemsFull = null;
    const PAGE_SIZE = 10;
    let currentPage = 0;
    let activeConsola = '', activeCat = '', activeSort = 'reciente';

    onAuthStateChanged(auth, u => { currentUser = u; });

    async function loadSoundbites() {
      try {
        const q = query(collection(db,'audios'), orderBy('creadoEn','desc'), limit(50));
        const snap = await getDocs(q);
        recentItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        await render();
      } catch(e) {
        document.getElementById('sbGrid').innerHTML =
          '<div class="empty-state"><p>Error loading. Reload the page.</p></div>';
      }
    }

    async function ensureFullData() {
      if (allItemsFull) return allItemsFull;
      const snap = await getDocs(collection(db,'audios'));
      allItemsFull = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      return allItemsFull;
    }

    async function render() {
      const search = document.getElementById('searchInput').value.toLowerCase().trim();
      const hayFiltrosActivos = !!search || !!activeConsola || !!activeCat || activeSort === 'love';

      let source = recentItems;
      if (hayFiltrosActivos) {
        if (!allItemsFull) {
          document.getElementById('sbGrid').innerHTML =
            '<div class="empty-state"><div class="spinner"></div><p>Searching the full library...</p></div>';
        }
        source = await ensureFullData();
      }

      let items = source.filter(a => {
        const mc = !activeConsola || a.consola === activeConsola;
        const mcat = !activeCat || a.categoria === activeCat;
        const ms = !search
          || (a.titulo||'').toLowerCase().includes(search)
          || (a.juego||'').toLowerCase().includes(search)
          || (a.autorNombre||'').toLowerCase().includes(search);
        return mc && mcat && ms;
      });
      if (activeSort === 'love') items.sort((a,b) => (b.reactions?.love||0)-(a.reactions?.love||0));
      if (activeSort === 'reciente') items.sort((a,b) => (b.creadoEn?.seconds||0)-(a.creadoEn?.seconds||0));

      const grid = document.getElementById('sbGrid');
      const pagEl = document.getElementById('sbPaginator');
      if (!items.length) {
        grid.innerHTML = '<div class="empty-state"><p>No soundbites match those filters.</p><a href="subir.html" class="btn-primary" style="margin-top:1rem;display:inline-block">Upload the first one</a></div>';
        pagEl.innerHTML = '';
        return;
      }

      const totalPages = Math.ceil(items.length / PAGE_SIZE);
      if (currentPage >= totalPages) currentPage = totalPages - 1;
      const slice = items.slice(currentPage * PAGE_SIZE, (currentPage + 1) * PAGE_SIZE);

      grid.innerHTML = slice.map(a => sbCard(a)).join('');
      pagEl.innerHTML = comPaginatorHTML(currentPage, totalPages);
      if (currentUser) await loadUserData();
    }

    function comPaginatorHTML(current, total) {
      if (total <= 1) return '';
      let html = '<div class="paginator">';
      for (let i = 0; i < total; i++) {
        html += `<button class="page-btn${i === current ? ' active' : ''}" onclick="goComPage(${i})">${i + 1}</button>`;
      }
      return html + '</div>';
    }

    window.goComPage = function(page) {
      currentPage = page;
      render();
      document.querySelector('.com-header').scrollIntoView({ behavior: 'smooth' });
    };

    function sbCard(a) {
      const r = a.reactions || { love:0, meh:0 };
      const imgSrc = a.imagen || `${ROOT}/assets/avatars/avatar0.png`;
      return `
        <div class="sb-card" id="card-${a.id}">
    <div class="sb-head">
            <img class="sb-thumb" src="${imgSrc}" alt="" loading="lazy" style="cursor:pointer"
                 onclick="location.href='soundbite.html?id=${a.id}'"
                 onerror="this.onerror=null;this.src='${ROOT}/assets/avatars/avatar0.png'"/>
            <div class="sb-head-info">
              <div class="sb-title" style="cursor:pointer" onclick="location.href='soundbite.html?id=${a.id}'">${a.titulo||'Untitled'} <span class="sb-dot">·</span> <span class="sb-tag-inline">${a.consola||'—'} · ${a.categoria||'soundbite'}</span></div>
              <div class="sb-meta">${a.juego||'—'} · <a class="sb-author" href="jugador.html?uid=${a.autorId||''}" style="text-decoration:none;color:var(--purple)">${a.autorNombre||'Anonymous'}</a></div>
            </div>
          </div>
          <div class="sb-player">
    <button class="sb-play" id="sbplay-${a.id}" onclick="playSB('${a.id}','${a.url}',${a.trimStart||0},${a.trimEnd||15})">
      <img src="../assets/icons/play.png" alt="Play"/>
    </button>
    <div class="sb-prog-wrap">
                  <div class="sb-prog-bar" id="sbbar-${a.id}" style="cursor:pointer" onclick="seekSB(event,'${a.id}','${a.url}',${a.trimStart||0},${a.trimEnd||15})"><div class="sb-prog-fill" id="sbprog-${a.id}"></div></div>
                  <div class="sb-time"><span id="sbcur-${a.id}">0:00</span><span>${a.duracion||'0:15'}</span></div>
                </div>
              </div>
              <div class="sb-footer">
                <div class="sb-reactions">
                  <button class="icon-btn icon-btn-love" onclick="react('${a.id}','love')" id="r-love-${a.id}" title="Love it">
      <img src="../assets/reactions/love.png" alt="Love it"/>
      <span class="icon-count">${r.love||0}</span>
    </button>
    <button class="icon-btn icon-btn-meh" onclick="react('${a.id}','meh')" id="r-meh-${a.id}" title="Meh">
      <img src="../assets/reactions/meh.png" alt="Meh"/>
      <span class="icon-count">${r.meh||0}</span>
    </button>
                </div>
                <div class="sb-actions">
                  <button class="icon-btn icon-btn-fav" id="fav-${a.id}" onclick="toggleFav('${a.id}')" title="Favorite">
      <img src="../assets/reactions/fav.png" alt="Favorite"/>
    </button>
                </div>
              </div>
            </div>`;
    }

    async function loadUserData() {
      if (!currentUser) return;
      try {
        const snap = await getDoc(doc(db,'usuarios',currentUser.uid));
        if (!snap.exists()) return;
        const data = snap.data();
        const favs = data.favoritos || [];
        const reacts = data.reacciones || {};
        Object.entries(reacts).forEach(([id, type]) => {
          const btn = document.getElementById(`r-${type}-${id}`);
          if (btn) btn.classList.add(`active-${type}`);
        });
        favs.forEach(id => {
          const btn = document.getElementById(`fav-${id}`);
          if (btn) btn.classList.add('active-fav');
        });
      } catch {}
    }

    window.react = async function(id, type) {
      if (!currentUser) { showAuthPrompt(); return; }
      try {
        const userRef  = doc(db, 'usuarios', currentUser.uid);
        const userSnap = await getDoc(userRef);
        const reacts   = userSnap.exists() ? (userSnap.data().reacciones || {}) : {};
        const prev     = reacts[id];

        const audioRef  = doc(db, 'audios', id);
        const audioSnap = await getDoc(audioRef);
        const reactions = audioSnap.exists() ? (audioSnap.data().reactions || {}) : {};

        const updates = {};

        if (prev) {
          updates[`reactions.${prev}`] = Math.max(0, (reactions[prev] || 0) - 1);
          const prevBtn = document.getElementById(`r-${prev}-${id}`);
          if (prevBtn) {
            prevBtn.classList.remove(`active-${prev}`);
            const s = prevBtn.querySelector('.icon-count');
            if (s) s.textContent = updates[`reactions.${prev}`];
          }
        }

        if (prev === type) {
          delete reacts[id];
          await updateDoc(userRef,  { reacciones: reacts });
          await updateDoc(audioRef, updates);
        } else {
          updates[`reactions.${type}`] = (reactions[type] || 0) + 1;
          reacts[id] = type;
          await updateDoc(userRef,  { reacciones: reacts });
          await updateDoc(audioRef, updates);
          const newBtn = document.getElementById(`r-${type}-${id}`);
          if (newBtn) {
            newBtn.classList.add(`active-${type}`);
            const s = newBtn.querySelector('.icon-count');
            if (s) s.textContent = updates[`reactions.${type}`];
          }
        }
      } catch(e) {
        window.showToast && window.showToast('Error: ' + e.message, 'error');
      }
    };

    window.toggleFav = async function(id) {
      if (!currentUser) { showAuthPrompt(); return; }
      const btn = document.getElementById(`fav-${id}`);
      const isActive = btn?.classList.contains('active-fav');
      try {
        const ref = doc(db,'usuarios',currentUser.uid);
        if (isActive) {
          await updateDoc(ref, { favoritos: arrayRemove(id) });
          btn.classList.remove('active-fav');
          window.showToast && window.showToast('Removed from favorites');
        } else {
          await updateDoc(ref, { favoritos: arrayUnion(id) });
          btn.classList.add('active-fav');
          window.showToast && window.showToast('Saved to favorites');
        }
      } catch(e) { window.showToast && window.showToast('Error: ' + e.message,'error'); }
    };

    window.deleteSB = async function(id) {
      if (!currentUser) return;
      if (!confirm('Delete this soundbite? This action cannot be undone.')) return;
      try {
        await deleteDoc(doc(db,'audios',id));
        document.getElementById(`card-${id}`)?.remove();
        recentItems = recentItems.filter(a => a.id !== id);
        if (allItemsFull) allItemsFull = allItemsFull.filter(a => a.id !== id);
        window.showToast && window.showToast('Soundbite deleted');
      } catch(e) { window.showToast && window.showToast('Error: ' + e.message,'error'); }
    };

    let audioCtx=null,activeSource=null,activeGain=null,activeSBId=null,progIv=null,playToken=0,pausedAt=0,lastElapsed=0,pausedSBId=null;
    const CLIP=15,FADE=2;
    function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

    function stopSB(isPause=false){
      playToken++;
      if(activeSource){
        try{
          if(activeSource._endTimeout) clearTimeout(activeSource._endTimeout);
          activeGain.gain.cancelScheduledValues(audioCtx.currentTime);
          activeGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
          const elAudio = activeSource;
          setTimeout(() => { try{ elAudio.pause(); }catch{} }, 150);
        }catch{}
        activeSource = activeGain = null;
      }
      clearInterval(progIv);
      if(activeSBId){
        const b = document.getElementById(`sbplay-${activeSBId}`);
        if(b){ b.innerHTML='<img src="../assets/icons/play.png" alt="Play"/>'; b.classList.remove('playing'); b.disabled=false; }
        if(!isPause){
          const p = document.getElementById(`sbprog-${activeSBId}`);
          if(p) p.style.width='0%';
          const c = document.getElementById(`sbcur-${activeSBId}`);
          if(c) c.textContent='0:00';
          pausedAt = 0;
        }
      }
      activeSBId = null;
    }

    async function startSB(id, url, ts, te, resumeOffset){
      stopSB(true); // no resetea la barra, ya la pintamos antes de llamar esto
      const myToken = ++playToken;
      const btn = document.getElementById(`sbplay-${id}`);
      if(!btn) return;

      btn.innerHTML = '<img src="../assets/icons/loading.png" alt="Loading" class="loading-icon"/>';
      btn.disabled  = true;

      try{
        const ctx = getCtx();
        if(ctx.state === 'suspended') await ctx.resume();

        const audioEl = new Audio();
        audioEl.crossOrigin = 'anonymous';
        audioEl.preload     = 'auto';
        audioEl.src         = url;

        await new Promise((resolve, reject) => {
          audioEl.addEventListener('loadedmetadata', resolve, { once:true });
          audioEl.addEventListener('error',          reject,  { once:true });
        });

        if(myToken !== playToken){
          btn.innerHTML = '<img src="../assets/icons/play.png" alt="Play"/>'; btn.disabled = false;
          return;
        }

        const baseStart     = Math.min(ts || 0, audioEl.duration - 1);
        const dur           = Math.min((te || 15) - (ts || 0), CLIP, audioEl.duration - baseStart);
        const safeResume    = Math.min(Math.max(resumeOffset,0), dur - 0.1);
        audioEl.currentTime = baseStart + safeResume;

        const source    = ctx.createMediaElementSource(audioEl);
        const gain      = ctx.createGain();
        const remaining = dur - safeResume;

        gain.gain.setValueAtTime(safeResume < FADE ? 0 : 1, ctx.currentTime);
        if(safeResume < FADE) gain.gain.linearRampToValueAtTime(1, ctx.currentTime + (FADE - safeResume));
        gain.gain.setValueAtTime(1, ctx.currentTime + remaining - FADE);
        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + remaining);

        source.connect(gain);
        gain.connect(ctx.destination);
        await audioEl.play();

        activeSource = audioEl;
        activeGain   = gain;
        activeSBId   = id;
        btn.innerHTML = '<img src="../assets/icons/pause.png" alt="Pause"/>';
        btn.classList.add('playing'); btn.disabled = false;

        const endTimeout = setTimeout(() => {
          if(activeSBId === id && myToken === playToken) stopSB();
        }, remaining * 1000);
        activeSource._endTimeout = endTimeout;

        const t0 = ctx.currentTime;
        progIv = setInterval(() => {
          if(myToken !== playToken){ clearInterval(progIv); return; }
          const el = safeResume + (ctx.currentTime - t0);
          lastElapsed = el;
          const p = document.getElementById(`sbprog-${id}`);
          const c = document.getElementById(`sbcur-${id}`);
          if(p) p.style.width = (Math.min(el, dur) / dur * 100) + '%';
          if(c) c.textContent = fmt(el);
          if(el >= dur) clearInterval(progIv);
        }, 100);

      }catch(e){
        if(myToken !== playToken) return;
        const b = document.getElementById(`sbplay-${id}`);
        if(b){ b.innerHTML='<img src="../assets/icons/error.png" alt="Error"/>'; b.style.background='var(--danger)'; b.disabled=false; }
        setTimeout(() => {
          const b = document.getElementById(`sbplay-${id}`);
          if(b){ b.innerHTML='<img src="../assets/icons/play.png" alt="Play"/>'; b.style.background=''; b.disabled=false; }
        }, 3000);
      }
    }

    window.playSB = async function(id, url, ts, te){
      if(activeSBId === id){
        pausedAt    = lastElapsed;
        pausedSBId  = id;
        stopSB(true);
        return;
      }
      const resumeOffset = (pausedSBId === id) ? pausedAt : 0;
      pausedSBId = null;
      await startSB(id, url, ts, te, resumeOffset);
    };

    window.seekSB = function(e, id, url, ts, te){
      const dur = Math.min((te||15)-(ts||0), CLIP);
      const bar = document.getElementById(`sbbar-${id}`);
      const rect = bar.getBoundingClientRect();
      const frac = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
      const target = frac * dur;

      lastElapsed = target;
      const p = document.getElementById(`sbprog-${id}`);
      const c = document.getElementById(`sbcur-${id}`);
      if(p) p.style.width = (target/dur*100)+'%';
      if(c) c.textContent = fmt(target);

      if(activeSBId === id){
        startSB(id, url, ts, te, target);
      } else {
        pausedSBId = id;
        pausedAt = target;
      }
    };

    function showAuthPrompt() {
      const existing = document.querySelector('.auth-prompt');
      if (existing) { existing.remove(); }
      const el = document.createElement('div');
      el.className = 'auth-prompt';
      el.innerHTML = `Sign in to vote and save favorites.<a href="${ROOT}/pages/login.html">Sign in</a>`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }

    function fmt(s){if(!s||isNaN(s))return'0:00';return`${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;}

    document.getElementById('searchBtn').addEventListener('click', () => { currentPage=0; render(); });
    document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key==='Enter'){ currentPage=0; render(); } });
    document.getElementById('searchInput').addEventListener('input', () => { currentPage=0; render(); });
    document.getElementById('consolaFilter').addEventListener('change', e => { activeConsola=e.target.value; currentPage=0; render(); });
    document.getElementById('catFilter').addEventListener('change', e => { activeCat=e.target.value; currentPage=0; render(); });
    document.getElementById('sortFilter').addEventListener('change', e => { activeSort=e.target.value; currentPage=0; render(); });

    await loadSoundbites();
  </script>
