<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="../assets/logo.png"/>
  <title>Players — Omnibites</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    .players-page { max-width: 860px; margin: 0 auto; padding: 2.5rem 1.5rem; }
    .players-page h1 { font-family: var(--font-head); font-size: 1.4rem; font-weight: 700; margin-bottom: 1.5rem; }

    .players-search {
  position: relative;
  margin-bottom: 2rem;
}
.players-search input {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  padding: .85rem 3rem .85rem 1rem;
  font-size: .95rem;
  font-family: var(--font-body);
  outline: none;
  transition: border-color .2s;
}
.players-search input:focus { border-color: var(--cyan); }
.players-search-btn {
  position: absolute;
  right: .6rem;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  padding: .25rem;
  opacity: .55;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity .2s;
}
.players-search-btn:hover { opacity: 1; }
.players-search-btn img { width: 35px; height: 35px; object-fit: contain; }
 
    .players-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }

    .player-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 1.25rem;
      display: flex; flex-direction: column; align-items: center;
      gap: .75rem; text-align: center;
      transition: border-color .2s, transform .2s;
      text-decoration: none; color: var(--text);
      cursor: pointer;
    }
    .player-card:hover { border-color: var(--cyan); transform: translateY(-2px); }

    .player-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      border: 2px solid var(--border); object-fit: cover;
      background: var(--bg3);
    }
    .player-avatar-fallback {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--cyan); color: #000;
      font-size: 1.4rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .player-name {
      font-family: var(--font-head); font-size: .9rem; font-weight: 700;
    }
    .player-stats {
  display: flex;
  align-items: center;
  gap: .6rem;
  font-size: .72rem;
  color: var(--text-dim);
}
.player-stats .pstat-divider {
  width: 1px; height: 14px;
  background: var(--border);
  flex-shrink: 0;
}
.player-stat-item {
  display: flex;
  align-items: center;
  gap: .3rem;
}
.player-stat-item img {
  width: 16px; height: 16px;
  object-fit: contain;
  opacity: .8;
}
.player-stat-item strong {
  color: var(--text);
  font-family: var(--font-head);
  font-size: .85rem;
  font-weight: 700;
}

    .state-msg { text-align: center; padding: 4rem 1rem; color: var(--text-dim); }
    .state-msg p { font-size: .9rem; }
    .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--cyan); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="../index.html" class="logo">
  <img src="../assets/logo.png" alt="Omnibites" class="nav-logo-img"/>
  <span class="logo-text">OMNI<span>BITES</span></span>
    </a>
    <div class="nav-links">
      <a href="comunidad.html">Community</a>
      <a href="explorar.html">Explore</a>
      <a href="subir.html">Add</a>    
      <a href="jugadores.html" class="active-jugadores">Players</a>
    </div>
    <div class="nav-right">
      <div id="nav-auth"></div>
      <button class="hamburger" id="hamburger" aria-label="Menu">&#9776;</button>
    </div>
  </nav>
  <div class="mobile-menu" id="mobileMenu">
    <a href="comunidad.html">Community</a>
    <a href="explorar.html">Explore</a>
    <a href="subir.html">Add</a>    
    <a href="jugadores.html" class="active-jugadores">Players</a>
  </div>

  <main class="players-page">
    <h1>Players</h1>
    <div class="players-search">
  <input type="text" id="searchInput" placeholder="Search player by name..."/>
  <button class="players-search-btn" id="searchBtn" title="Search">
    <img src="../assets/icons/search.png" alt="Search"/>
  </button>
    </div>
    <div id="playersGrid" class="players-grid">
      <div class="state-msg" style="grid-column:1/-1">
        <div class="spinner"></div>
        <p>Loading players...</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p>Made with love for the community</p>
      <div class="footer-links">
        <a href="legal.html">License</a>
        <a href="https://github.com/jhondydario/Omnibites" target="_blank">GitHub</a>
        <a href="https://www.paypal.com/donate/?hosted_button_id=VTCEB23YUFYKJ" target="_blank">Donate</a>
      </div>
      <a href="../index.html" class="logo">
        <span class="logo-text">OMNI<span>BITES</span></span>
      </a>
    </div>
  </footer>

  <script type="module">
    import { auth, db } from '../js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { collection, getDocs, query, where, orderBy, limit }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const ROOT = location.hostname === 'jhondydario.github.io' ? '/Omnibites' : '';
    const DEFAULT_LIMIT = 30; // también el máximo que soporta el operador 'in' de Firestore

    let currentUser = null;
    onAuthStateChanged(auth, u => {
      currentUser = u;
      // Re-renderiza con los mismos datos ya cargados para actualizar el link "es mi perfil"
      render(document.getElementById('searchInput').value);
    });

    // ── Nivel 1: unos pocos jugadores por defecto (sin escanear toda la colección) ──
    let defaultPlayers = null;
    async function loadDefaultPlayers() {
      try {
        const usersQ = query(collection(db, 'usuarios'), orderBy('creadoEn', 'desc'), limit(DEFAULT_LIMIT));
        const usersSnap = await getDocs(usersQ);
        const baseUsers = usersSnap.docs.map(d => ({ uid: d.id, ...d.data() }));
        const uids = baseUsers.map(u => u.uid);

        let audioCountMap = {}, loveCountMap = {};
        if (uids.length) {
          const audiosQ = query(collection(db, 'audios'), where('autorId', 'in', uids));
          const audiosSnap = await getDocs(audiosQ);
          audiosSnap.docs.forEach(d => {
            const uid = d.data().autorId;
            const love = d.data().reactions?.love || 0;
            audioCountMap[uid] = (audioCountMap[uid] || 0) + 1;
            loveCountMap[uid]  = (loveCountMap[uid]  || 0) + love;
          });
        }

        // Seguidores: una consulta chiquita por cada jugador visible (acotado a DEFAULT_LIMIT)
        const followerCounts = await Promise.all(baseUsers.map(async u => {
          try {
            const snap = await getDocs(query(collection(db, 'usuarios'), where('siguiendo', 'array-contains', u.uid)));
            return snap.size;
          } catch { return 0; }
        }));

        defaultPlayers = baseUsers.map((u, i) => ({
          ...u,
          audios: audioCountMap[u.uid] || 0,
          love: loveCountMap[u.uid] || 0,
          seguidores: followerCounts[i] || 0,
          // Conteo crudo de favoritos, sin filtrar huérfanos, para no tener que leer toda la colección de audios
          favs: (u.favoritos || []).length
        }));
      } catch(e) {
        console.error('Error loading default players:', e.message);
        defaultPlayers = [];
      }
    }

    // ── Nivel 2: colección completa, solo se pide si el usuario busca (se cachea) ──
    let fullPlayers = null;
    async function ensureFullPlayers() {
      if (fullPlayers) return fullPlayers;
      const [usersSnap, audiosSnap] = await Promise.all([
        getDocs(collection(db, 'usuarios')),
        getDocs(collection(db, 'audios'))
      ]);

      const audioCountMap = {}, loveCountMap = {}, followersCountMap = {};
      audiosSnap.docs.forEach(d => {
        const uid  = d.data().autorId;
        const love = d.data().reactions?.love || 0;
        if (uid) {
          audioCountMap[uid] = (audioCountMap[uid] || 0) + 1;
          loveCountMap[uid]  = (loveCountMap[uid]  || 0) + love;
        }
      });
      usersSnap.docs.forEach(d => {
        const sig = d.data().siguiendo || [];
        sig.forEach(uidSeguido => {
          followersCountMap[uidSeguido] = (followersCountMap[uidSeguido] || 0) + 1;
        });
      });

      const validAudioIds = new Set(audiosSnap.docs.map(d => d.id));

      fullPlayers = usersSnap.docs.map(d => {
        const data = d.data();
        const favsReal = (data.favoritos || []).filter(id => validAudioIds.has(id)).length;
        return {
          uid: d.id,
          ...data,
          audios: audioCountMap[d.id] || 0,
          love:   loveCountMap[d.id]  || 0,
          seguidores: followersCountMap[d.id] || 0,
          favs: favsReal
        };
      });
      return fullPlayers;
    }

    function cardHTML(p) {
      const name = p.nombre || 'Player';
      const initial = name.charAt(0).toUpperCase();
      const avatarHTML = p.avatar
        ? `<img class="player-avatar" src="${ROOT}/assets/avatars/${p.avatar}.png" alt="${name}"
             onerror="this.style.display='none';this.nextSibling.style.display='flex'"/>
           <div class="player-avatar-fallback" style="display:none">${initial}</div>`
        : `<div class="player-avatar-fallback">${initial}</div>`;

      const isMe = currentUser && currentUser.uid === p.uid;
      const href = isMe ? 'perfil.html' : `jugador.html?uid=${p.uid}`;

      return `
        <a class="player-card" href="${href}">
          ${avatarHTML}
          <div class="player-name">${name}</div>
<div class="player-stats">
  <div class="player-stat-item">
    <img src="../assets/icons/soundbite.png" alt="Soundbites"/>
    <strong>${p.audios}</strong>
  </div>
  <div class="pstat-divider"></div>
  <div class="player-stat-item">
    <img src="../assets/reactions/love.png" alt="Love it"/>
    <strong>${p.love}</strong>
  </div>
<div class="pstat-divider"></div>
  <div class="player-stat-item">
    <img src="../assets/reactions/fav.png" alt="Favorites"/>
    <strong>${p.favs}</strong>
  </div>
  <div class="pstat-divider"></div>
  <div class="player-stat-item">
    <img src="../assets/icons/followers.png" alt="Followers"/>
    <strong>${p.seguidores}</strong>
  </div>
  <div class="pstat-divider"></div>
<div class="player-stat-item">
  <img src="../assets/icons/trophy.png" alt="Trivia"/>
  <strong>${p.triviaPuntosTotal || 0}</strong>
</div>
</div>
        </a>`;
    }

    async function render(search) {
      const grid = document.getElementById('playersGrid');
      const q = (search || '').toLowerCase().trim();

      let source;
      if (q) {
        if (!fullPlayers) {
          grid.innerHTML = '<div class="state-msg" style="grid-column:1/-1"><div class="spinner"></div><p>Searching all players...</p></div>';
        }
        source = await ensureFullPlayers();
      } else {
        source = defaultPlayers || [];
      }

      const filtered = q
        ? source.filter(p => (p.nombre || '').toLowerCase().includes(q))
        : source;

      if (!filtered.length) {
        grid.innerHTML = '<div class="state-msg" style="grid-column:1/-1"><p>No player found.</p></div>';
        return;
      }

      grid.innerHTML = filtered.map(cardHTML).join('');
    }

    document.getElementById('searchBtn').addEventListener('click', () => {
      render(document.getElementById('searchInput').value);
    });
    document.getElementById('searchInput').addEventListener('input', e => {
      render(e.target.value);
    });
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') render(e.target.value);
    });

    (async function init() {
      await loadDefaultPlayers();
      render('');
    })();
  </script>
  <script type="module" src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
</body>
</html>
