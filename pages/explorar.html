<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explorar — Omnibites</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .search-section {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 1rem;
    }
    .search-section h1 {
      font-family: var(--font-pixel);
      font-size: 0.85rem;
      color: var(--neon);
      margin-bottom: 1.5rem;
    }
    .search-bar {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .search-bar input {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 0.85rem 1rem;
      font-size: 1rem;
      font-family: var(--font-body);
      outline: none;
      transition: border-color 0.2s;
    }
    .search-bar input:focus { border-color: var(--neon); }
    .search-hint {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-bottom: 1.5rem;
    }
    .search-hint span {
      color: var(--neon);
      cursor: pointer;
      margin-right: 0.5rem;
    }
    .search-hint span:hover { text-decoration: underline; }

    /* Resultados */
    .results-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }
    .results-header {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 1.25rem;
    }
    .results-header strong { color: var(--neon); }

    /* Audio result card */
    .result-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }
    .result-card:hover { border-color: var(--neon); }
    .result-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }
    .result-card-info { flex: 1; }
    .result-card-title {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.25rem;
      color: var(--text);
    }
    .result-card-meta {
      font-size: 0.75rem;
      color: var(--text-dim);
    }
    .result-card-meta span { color: var(--neon); margin-right: 0.5rem; }

    /* Mini player */
    .mini-player {
      background: var(--bg3);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .mini-play-btn {
      background: var(--neon);
      color: #000;
      border: none;
      border-radius: 50%;
      width: 36px; height: 36px;
      font-size: 0.75rem;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      transition: opacity 0.2s;
    }
    .mini-play-btn:hover { opacity: 0.8; }
    .mini-play-btn.playing { background: var(--purple); }

    .mini-progress-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .mini-progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      cursor: pointer;
    }
    .mini-progress-fill {
      height: 100%;
      background: var(--neon);
      width: 0%;
      transition: width 0.1s linear;
    }
    .mini-time {
      font-family: var(--font-pixel);
      font-size: 0.45rem;
      color: var(--text-dim);
      display: flex;
      justify-content: space-between;
    }

    .card-actions {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.75rem;
      flex-wrap: wrap;
    }
    .btn-sm {
      padding: 0.4rem 0.9rem;
      font-size: 0.78rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 600;
      border: none;
      text-decoration: none;
      display: inline-block;
    }
    .btn-sm-green  { background: var(--neon); color: #000; }
    .btn-sm-outline { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
    .btn-sm-outline:hover { border-color: var(--neon); color: var(--neon); }

    /* Estado vacío / cargando */
    .state-msg {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-dim);
    }
    .state-msg .emoji { font-size: 3rem; margin-bottom: 1rem; }
    .state-msg p { font-size: 0.9rem; margin-bottom: 0.5rem; }
    .state-msg small { font-size: 0.78rem; }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--neon);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Sugerencias dinámicas post-búsqueda */
    .related-wrap {
      margin-bottom: 1.25rem;
      font-size: 0.78rem;
      color: var(--text-dim);
    }
    .related-wrap strong { color: var(--text); }
    .related-chip {
      display: inline-block;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.3rem 0.8rem;
      margin: 0.3rem 0.25rem 0 0;
      cursor: pointer;
      color: var(--neon);
      font-size: 0.75rem;
      transition: background 0.2s, border-color 0.2s;
    }
    .related-chip:hover { background: rgba(57,255,20,0.08); border-color: var(--neon); }

    /* Botón descarga */
    .btn-sm-download {
      background: transparent;
      border: 1px solid var(--cyan);
      color: var(--cyan);
    }
    .btn-sm-download:hover { background: var(--cyan); color: #000; }
    .btn-sm-download.loading { opacity: 0.6; pointer-events: none; }

    /* Fade indicator */
    .fade-badge {
      display: inline-block;
      background: rgba(57,255,20,0.1);
      border: 1px solid var(--neon-dim);
      color: var(--neon);
      border-radius: 20px;
      padding: 0.15rem 0.6rem;
      font-size: 0.68rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="../index.html" class="logo">OMNI<span>BITES</span></a>
    <div class="nav-links">
      <a href="comunidad.html">Soundbites</a>
      <a href="explorar.html" class="active">Explorar música</a>
      <a href="subir.html">Crear Soundbite</a>
      <div id="nav-auth"></div>
    </div>
    <button class="hamburger" id="hamburger" aria-label="Menú">&#9776;</button>
  </nav>
  <div class="mobile-menu" id="mobileMenu">
    <a href="comunidad.html">Soundbites</a>
    <a href="explorar.html">Explorar música</a>
    <a href="subir.html">Crear Soundbite</a>
    <div id="mobile-auth"></div>
  </div>

  <!-- BÚSQUEDA -->
  <div class="search-section">
    <h1>Buscar música</h1>
    <div class="search-bar">
      <input type="text" id="searchInput"
        placeholder="Ej: Star Fox Assault, Zelda, Mario Kart..." />
      <button class="btn-primary" id="searchBtn">Buscar</button>
    </div>

  </div>

  <!-- RESULTADOS -->
  <div class="results-wrap">
    <div id="relatedWrap" style="display:none" class="related-wrap"></div>
    <div id="stateMsg" class="state-msg">
      <div class="emoji">🎮</div>
      <p>Busca un juego para encontrar sus audios</p>
      <small>Powered by Archive.org — miles de soundtracks gratuitos</small>
    </div>
    <div id="resultsHeader" style="display:none" class="results-header"></div>
    <div id="resultsList"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>
  <script type="module">
    import { auth } from '../js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    let currentUser = null;
    onAuthStateChanged(auth, u => currentUser = u);

    // Audio context global para fade
    let audioCtx = null;
    let activeSource = null;
    let activeGain   = null;
    let activeCard   = null;
    let progressInterval = null;

    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    // ── PALABRAS IGNORADAS (stopwords) ───────────────────────────
    const STOPWORDS = new Set(['the','de','la','el','los','las','un','una','and','of','for','en','a','con','por','del']);

    // ── ENRIQUECER QUERY AUTOMÁTICAMENTE ─────────────────────────
    // El usuario escribe lo que sea → el sistema lo convierte en
    // una búsqueda precisa sin que el usuario tenga que saber nada
    function enrichQuery(raw) {
      const clean = raw.trim().toLowerCase();

      // Detectar si ya tiene términos de OST
      const alreadyHasOST = /\b(ost|soundtrack|music|audio|sound)\b/.test(clean);

      // Palabras clave del juego (sin stopwords)
      const words = clean.split(/\s+/).filter(w => w.length > 1 && !STOPWORDS.has(w));

      // Construir título de búsqueda con sinónimos de OST
      const ostTerms = 'title:(ost OR soundtrack OR "original soundtrack" OR "game music" OR "video game music" OR music OR audio)';
      const subjectTerms = 'subject:(videogame OR "video game" OR gaming OR nintendo OR sega OR playstation OR "game music" OR ost OR soundtrack OR arcade)';

      // Query principal: título del juego + OST
      const titleQuery = words.map(w => `title:${w}`).join(' AND ');
      const primary = `(${titleQuery}) AND (${ostTerms} OR ${subjectTerms}) AND mediatype:audio`;

      // Query de respaldo: solo palabras en cualquier campo + filtro videojuego
      const anyField = words.join(' ');
      const fallback = `(${anyField}) AND (${subjectTerms}) AND mediatype:audio`;

      // Query de último recurso: palabras + "soundtrack" o "ost" forzado
      const lastResort = `("${words.join(' ')}") AND mediatype:audio`;

      return { primary, fallback, lastResort, words };
    }

    // ── SISTEMA DE PUNTUACIÓN DE RELEVANCIA ──────────────────────
    function scoreDoc(doc, words) {
      const title   = (doc.title   || '').toLowerCase();
      const subject = Array.isArray(doc.subject)
        ? doc.subject.join(' ').toLowerCase()
        : (doc.subject || '').toLowerCase();

      let score = 0;

      // +3 por cada palabra del juego en el título
      words.forEach(w => { if (title.includes(w)) score += 3; });

      // +2 si tiene OST/soundtrack en el título
      if (/\b(ost|soundtrack|original soundtrack|game music)\b/.test(title)) score += 2;

      // +1 por subject de videojuego
      if (/\b(videogame|video game|nintendo|sega|playstation|arcade|gaming)\b/.test(subject)) score += 1;

      // -2 si el título NO contiene ninguna palabra del juego (resultado irrelevante)
      const anyMatch = words.some(w => title.includes(w));
      if (!anyMatch) score -= 2;

      return score;
    }

    // ── BÚSQUEDA PRINCIPAL ────────────────────────────────────────
    async function searchArchive(query) {
      showLoading();
      try {
        const { primary, fallback, lastResort, words } = enrichQuery(query);
        let docs = [];

        // Intento 1: query precisa con OST
        docs = await runSearch(primary, 15);

        // Intento 2: fallback con filtro de videojuego
        if (docs.length === 0) {
          docs = await runSearch(fallback, 15);
        }

        // Intento 3: último recurso, cualquier audio con esas palabras
        if (docs.length === 0) {
          docs = await runSearch(lastResort, 10);
        }

        if (docs.length === 0) { showEmpty(query); return; }

        // Puntuar y ordenar por relevancia
        const scored = docs
          .map(doc => ({ doc, score: scoreDoc(doc, words) }))
          .sort((a, b) => b.score - a.score)
          .filter(s => s.score > -2) // descartar resultados muy irrelevantes
          .slice(0, 6);              // máximo 6 álbumes para obtener ~10 tracks

        if (scored.length === 0) { showEmpty(query); return; }

        // Obtener archivos de audio de cada álbum
        const items = await Promise.all(
          scored.map(s => fetchItemFiles(s.doc, words))
        );

        // Aplanar, quitar nulos y limitar a 10 resultados
        const flat = items.flat().filter(Boolean).slice(0, 10);

        if (flat.length === 0) { showEmpty(query); return; }

        renderResults(flat, query);
      } catch (e) {
        console.error(e);
        showError();
      }
    }

    async function runSearch(q, rows = 12) {
      const url = `https://archive.org/advancedsearch.php?q=${encodeURIComponent(q)}&fl[]=identifier,title,description,creator,year,subject&rows=${rows}&output=json&sort[]=downloads+desc`;
      const res  = await fetch(url);
      const data = await res.json();
      return data?.response?.docs || [];
    }

    async function fetchItemFiles(doc, words = []) {
      try {
        const res  = await fetch(`https://archive.org/metadata/${doc.identifier}/files`);
        const data = await res.json();
        const files = (data?.result || [])
          .filter(f => /\.(mp3|ogg|flac|wav)$/i.test(f.name))
          .filter(f => !f.length || parseFloat(f.length) > 10)
          .filter(f => !/\b(sfx|effect|jingle|short|voice|vo_|fx_)\b/i.test(f.name));

        // Puntuar tracks por relevancia con las palabras buscadas
        const scored = files.map(f => {
          const nameLower = f.name.toLowerCase();
          const score = words.filter(w => nameLower.includes(w)).length;
          return { f, score };
        }).sort((a, b) => b.score - a.score);

        // Máximo 2 tracks por álbum para dar variedad
        return scored.slice(0, 2).map(({ f }) => ({
          id:        doc.identifier + '/' + f.name,
          title:     cleanName(f.name),
          album:     doc.title || doc.identifier,
          creator:   doc.creator || 'Desconocido',
          year:      doc.year || '',
          duration:  f.length ? formatTime(parseFloat(f.length)) : '—',
          seconds:   f.length ? parseFloat(f.length) : 0,
          url:       `https://archive.org/download/${doc.identifier}/${encodeURIComponent(f.name)}`,
          archiveId: doc.identifier
        }));
      } catch { return []; }
    }

    function cleanName(name) {
      return name
        .replace(/\.[^.]+$/, '')
        .replace(/[-_]/g, ' ')
        .replace(/^\d+\s*/, '')
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    // Limpia el nombre del álbum para el nombre de descarga
    // Ej: "Star Fox Assault Orchestra Soundtrack CD Original Soundtrack [NINTENDO 050321] (L100 C)/01 Star Fox Theme"
    // → "Star Fox Assault Orchestra Soundtrack CD"
    function cleanAlbumForFilename(album) {
      return album
        .replace(/\/.*$/, '')            // quita todo tras /
        .replace(/\[.*?\]/g, '')         // quita [corchetes]
        .replace(/\(.*?\)/g, '')         // quita (paréntesis)
        .replace(/original soundtrack/gi, '')
        .replace(/soundtrack/gi, 'OST')
        .replace(/\s+/g, ' ')
        .trim()
        .slice(0, 60);                   // máximo 60 caracteres
    }

    // ── RENDER ───────────────────────────────────────────────────
    function renderResults(items, query) {
      const header = document.getElementById('resultsHeader');
      const list   = document.getElementById('resultsList');
      const state  = document.getElementById('stateMsg');

      state.style.display  = 'none';
      header.style.display = 'block';
      header.innerHTML     = `Encontrados <strong>${items.length}</strong> audios para "<strong>${query}</strong>" — Clip de preview: 15 seg con fade`;

      list.innerHTML = items.map((item, i) => `
        <div class="result-card" id="card-${i}">
          <div class="result-card-top">
            <div class="result-card-info">
              <div class="result-card-title">${item.title}</div>
              <div class="result-card-meta">
                <span>🎮</span>${item.album}
                ${item.year ? `· ${item.year}` : ''}
                · ${item.duration}
                <span class="fade-badge" style="margin-left:0.4rem">Fade 15s</span>
              </div>
            </div>
          </div>

          <div class="mini-player">
            <button class="mini-play-btn" id="playBtn-${i}"
              onclick="togglePlay(${i}, '${item.url}', ${item.seconds})">▶</button>
            <div class="mini-progress-wrap">
              <div class="mini-progress-bar" onclick="seekTo(event, ${i}, ${item.seconds})">
                <div class="mini-progress-fill" id="prog-${i}"></div>
              </div>
              <div class="mini-time">
                <span id="cur-${i}">0:00</span>
                <span>preview 15s</span>
              </div>
            </div>
          </div>

          <div class="card-actions">
            <button class="btn-sm btn-sm-green"
              onclick="compartir(${i}, '${item.url}', '${escape(item.title)}', '${escape(item.album)}')">
              📤 Compartir en Omnibites
            </button>
            <button class="btn-sm btn-sm-download" id="dlBtn-${i}"
              onclick="descargarMP3(${i}, '${item.url}', '${escape(item.album)}', '${escape(item.title)}')">
              ⬇️ Descargar MP3
            </button>
            <a class="btn-sm btn-sm-outline"
              href="https://archive.org/details/${item.archiveId}" target="_blank">
              Fuente del audio
            </a>
          </div>
        </div>
      `).join('');

      // Guardar items para compartir
      window._items = items;
      updateSearchHints(query);
    }

    // ── PLAYER CON FADE IN/OUT ────────────────────────────────────
    const CLIP_DURATION = 15; // segundos
    const FADE_DURATION  = 2; // segundos de fade

    window.togglePlay = async function(idx, url, totalSecs) {
      const btn = document.getElementById(`playBtn-${idx}`);

      // Si ya está sonando esta tarjeta → pausar
      if (activeCard === idx) {
        stopActive();
        return;
      }

      // Detener lo que estaba sonando
      stopActive();

      btn.textContent = '...';
      btn.disabled = true;

      try {
        const ctx = getAudioCtx();
        if (ctx.state === 'suspended') await ctx.resume();

        // Fetch y decodificar audio
        const res    = await fetch(url);
        const arrBuf = await res.arrayBuffer();
        const buf    = await ctx.decodeAudioData(arrBuf);

        // Punto de inicio aleatorio (evita siempre el principio)
        const maxStart = Math.max(0, buf.duration - CLIP_DURATION - 5);
        const startAt  = totalSecs > 30
          ? Math.random() * Math.min(maxStart, buf.duration * 0.3) + buf.duration * 0.1
          : 0;

        // Nodo de fuente
        const source = ctx.createBufferSource();
        source.buffer = buf;

        // Nodo de ganancia (volumen) para fade
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0, ctx.currentTime);

        // Fade IN
        gain.gain.linearRampToValueAtTime(1, ctx.currentTime + FADE_DURATION);

        // Fade OUT al final del clip
        const clipEnd = ctx.currentTime + CLIP_DURATION;
        gain.gain.setValueAtTime(1, clipEnd - FADE_DURATION);
        gain.gain.linearRampToValueAtTime(0, clipEnd);

        source.connect(gain);
        gain.connect(ctx.destination);

        source.start(0, startAt, CLIP_DURATION);
        source.onended = () => {
          if (activeCard === idx) stopActive();
        };

        activeSource = source;
        activeGain   = gain;
        activeCard   = idx;

        btn.textContent = '||';
        btn.classList.add('playing');
        btn.disabled = false;

        // Barra de progreso
        const startTime = ctx.currentTime;
        progressInterval = setInterval(() => {
          const elapsed = Math.min(ctx.currentTime - startTime, CLIP_DURATION);
          const pct     = (elapsed / CLIP_DURATION) * 100;
          const progEl  = document.getElementById(`prog-${idx}`);
          const curEl   = document.getElementById(`cur-${idx}`);
          if (progEl) progEl.style.width = pct + '%';
          if (curEl)  curEl.textContent  = formatTime(elapsed);
          if (elapsed >= CLIP_DURATION) clearInterval(progressInterval);
        }, 100);

      } catch (e) {
        console.error(e);
        btn.textContent = '▶';
        btn.disabled = false;
        alert('No se pudo cargar este audio. Prueba con otro resultado.');
      }
    };

    function stopActive() {
      if (activeSource) {
        try {
          activeGain.gain.cancelScheduledValues(audioCtx.currentTime);
          activeGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
          activeSource.stop(audioCtx.currentTime + 0.3);
        } catch {}
        activeSource = null;
        activeGain   = null;
      }
      clearInterval(progressInterval);
      if (activeCard !== null) {
        const btn  = document.getElementById(`playBtn-${activeCard}`);
        const prog = document.getElementById(`prog-${activeCard}`);
        const cur  = document.getElementById(`cur-${activeCard}`);
        if (btn)  { btn.textContent = '▶'; btn.classList.remove('playing'); btn.disabled = false; }
        if (prog) prog.style.width = '0%';
        if (cur)  cur.textContent  = '0:00';
      }
      activeCard = null;
    }

    window.seekTo = function(e, idx, totalSecs) {
      // Solo indicativo visual, no cambia el audio (limitación de fetch)
    };

    // ── DESCARGAR CLIP DE 15s EN MP3 ──────────────────────────────
    window.descargarMP3 = async function(idx, url, albumEsc, titleEsc) {
      const btn = document.getElementById(`dlBtn-${idx}`);
      btn.textContent = '... Convirtiendo...';
      btn.classList.add('loading');
      try {
        const ctx = getAudioCtx();
        if (ctx.state === 'suspended') await ctx.resume();
        const res = await fetch(url);
        if (!res.ok) throw new Error('fetch error');
        const buf = await ctx.decodeAudioData(await res.arrayBuffer());

        const maxStart = Math.max(0, buf.duration - CLIP_DURATION - 2);
        const startAt  = buf.duration > 30
          ? Math.min(maxStart, buf.duration * 0.15) : 0;
        const dur = Math.min(CLIP_DURATION, buf.duration - startAt);

        // Renderizar clip con fade offline
        const offCtx = new OfflineAudioContext(1, Math.floor(dur * 44100), 44100);
        const src = offCtx.createBufferSource();
        // Resamplear al mismo buffer
        src.buffer = buf;
        const gain = offCtx.createGain();
        gain.gain.setValueAtTime(0, 0);
        gain.gain.linearRampToValueAtTime(1, FADE_DURATION);
        gain.gain.setValueAtTime(1, dur - FADE_DURATION);
        gain.gain.linearRampToValueAtTime(0, dur);
        src.connect(gain); gain.connect(offCtx.destination);
        src.start(0, startAt, dur);
        const rendered = await offCtx.startRendering();

        // Convertir a MP3 con lamejs
        const mp3Data = encodeToMP3(rendered);
        const blob = new Blob(mp3Data, { type: 'audio/mp3' });

        const album = unescape(albumEsc);
        const title = unescape(titleEsc);
        // Use album (game name) as primary identifier
        const filename = `${cleanAlbumForFilename(album)} [Omnibites].mp3`
          .replace(/[<>:"/\\|?*]/g, '').slice(0, 100);

        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);

        btn.textContent = ' ¡Listo!';
        setTimeout(() => { btn.textContent = '⬇️ MP3'; btn.classList.remove('loading'); }, 3000);
      } catch (e) {
        console.error(e);
        btn.textContent = '✕ Error';
        btn.classList.remove('loading');
        setTimeout(() => { btn.textContent = '⬇️ MP3'; }, 2500);
      }
    };

    function encodeToMP3(audioBuffer) {
      const sampleRate = audioBuffer.sampleRate;
      const samples = audioBuffer.getChannelData(0);
      const mp3enc = new lamejs.Mp3Encoder(1, sampleRate, 128);
      const blockSize = 1152;
      const mp3Data = [];
      const int16 = new Int16Array(samples.length);
      for (let i = 0; i < samples.length; i++) {
        int16[i] = Math.max(-32768, Math.min(32767, samples[i] * 32767));
      }
      for (let i = 0; i < int16.length; i += blockSize) {
        const chunk = int16.subarray(i, i + blockSize);
        const encoded = mp3enc.encodeBuffer(chunk);
        if (encoded.length > 0) mp3Data.push(new Uint8Array(encoded));
      }
      const end = mp3enc.flush();
      if (end.length > 0) mp3Data.push(new Uint8Array(end));
      return mp3Data;
    }

    // ── COMPARTIR EN OMNIBITES ────────────────────────────────────
    window.compartir = function(idx, url, titleEsc, albumEsc) {
      const title = unescape(titleEsc);
      const album = unescape(albumEsc);
      const params = new URLSearchParams({
        url, titulo: title, juego: album
      });
      window.location.href = `subir.html?${params.toString()}`;
    };

    // ── SUGERENCIAS RELACIONADAS ──────────────────────────────────
    // Base de datos de juegos relacionados por franquicia/género
    const RELATED_GAMES = {
      'star fox': ['Star Fox 64', 'Star Fox Adventures', 'Star Fox Command', 'Star Fox Zero'],
      'mario':    ['Super Mario 64', 'Mario Kart 64', 'Paper Mario', 'Mario Galaxy', 'Mario Odyssey'],
      'zelda':    ['Zelda: Majora\'s Mask', 'Zelda: Wind Waker', 'Zelda: Twilight Princess', 'Zelda: Skyward Sword'],
      'sonic':    ['Sonic Adventure', 'Sonic Adventure 2', 'Sonic Heroes', 'Sonic Rush'],
      'metroid':  ['Metroid Fusion', 'Metroid Zero Mission', 'Metroid Prime 2', 'Metroid Prime 3'],
      'pokemon':  ['Pokemon Gold Silver', 'Pokemon Ruby Sapphire', 'Pokemon Diamond Pearl', 'Pokemon HeartGold'],
      'kirby':    ['Kirby Super Star', 'Kirby 64', 'Kirby Amazing Mirror', 'Kirby Canvas Curse'],
      'donkey':   ['Donkey Kong Country 2', 'Donkey Kong Country 3', 'DK64'],
      'mega man': ['Mega Man X2', 'Mega Man X3', 'Mega Man Zero', 'Mega Man Battle Network'],
      'castlevania': ['Castlevania Symphony of the Night', 'Castlevania Circle of the Moon', 'Castlevania Aria of Sorrow'],
      'final fantasy': ['Final Fantasy VI', 'Final Fantasy VIII', 'Final Fantasy IX', 'Final Fantasy X'],
      'f-zero':   ['F-Zero X', 'F-Zero GX', 'F-Zero Maximum Velocity'],
      'fire emblem': ['Fire Emblem Sacred Stones', 'Fire Emblem Path of Radiance', 'Fire Emblem Awakening'],
    };

    function showRelatedSuggestions(query) {
      const wrap = document.getElementById('relatedWrap');
      const qLow = query.toLowerCase();

      // Buscar franquicia que coincida
      let related = [];
      for (const [key, games] of Object.entries(RELATED_GAMES)) {
        if (qLow.includes(key) || key.includes(qLow.split(' ')[0])) {
          related = games.filter(g => !g.toLowerCase().includes(qLow));
          break;
        }
      }

      // Si no hay relacionados específicos, mostrar géneros similares
      if (related.length === 0) {
        related = ['Super Smash Bros Melee', 'Metroid Prime', 'Pikmin', 'Luigi\'s Mansion', 'Animal Crossing'];
      }

      wrap.style.display = 'block';
      wrap.innerHTML = `
        <strong>Búsquedas relacionadas:</strong><br/>
        ${related.slice(0, 5).map(g =>
          `<span class="related-chip" onclick="quickSearch('${g}')">${g}</span>`
        ).join('')}
      `;
    }

    // Actualizar hints del buscador tras búsqueda
    function updateSearchHints(query) {
      showRelatedSuggestions(query);
    }

    // ── HELPERS ───────────────────────────────────────────────────
    function showLoading() {
      document.getElementById('resultsHeader').style.display = 'none';
      document.getElementById('resultsList').innerHTML = '';
      document.getElementById('stateMsg').style.display = 'block';
      document.getElementById('stateMsg').innerHTML = `
        <div class="spinner"></div>
        <p>Buscando en Archive.org...</p>
        <small>Esto puede tardar unos segundos</small>
      `;
    }
    function showEmpty(q) {
      document.getElementById('stateMsg').innerHTML = `
        <div class="emoji">😔</div>
        <p>No encontramos audios para "<strong>${q}</strong>"</p>
        <small>Prueba con el nombre en inglés o solo el nombre del juego</small>
      `;
      document.getElementById('stateMsg').style.display = 'block';
    }
    function showError() {
      document.getElementById('stateMsg').innerHTML = `
        <div class="emoji">⚠️</div>
        <p>Error de conexión con Archive.org</p>
        <small>Verifica tu internet e inténtalo de nuevo</small>
      `;
    }

    function formatTime(s) {
      if (!s || isNaN(s)) return '0:00';
      const m   = Math.floor(s / 60);
      const sec = Math.floor(s % 60).toString().padStart(2,'0');
      return `${m}:${sec}`;
    }

    // ── EVENTOS ───────────────────────────────────────────────────
    function doSearch() {
      const q = document.getElementById('searchInput').value.trim();
      if (!q) return;
      stopActive();
      // Hide hints after first search
      const hints = document.getElementById('searchHints');
      if (hints) hints.style.display = 'none';
      document.getElementById('relatedWrap').style.display = 'none';
      searchArchive(q);
    }

    window.quickSearch = function(q) {
      document.getElementById('searchInput').value = q;
      doSearch();
    };

    document.getElementById('searchBtn').addEventListener('click', doSearch);
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });

    // Si viene de un parámetro en la URL
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('q')) {
      document.getElementById('searchInput').value = urlParams.get('q');
      doSearch();
    }
  </script>
  <script type="module" src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
